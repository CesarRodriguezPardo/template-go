services:
  postgres-db:
      image: postgres:latest
      ports:
        - "5432:5432"
      volumes:
        - postgres-db:/var/lib/postgresql/data
      environment:
      - POSTGRES_USER=${DB_USER_POSTGRES}
      - POSTGRES_PASSWORD=${DB_PASS_POSTGRES}
      - POSTGRES_DB=${DB_NAME_POSTGRES}
      networks:
        - template-network
      healthcheck:
          test: ["CMD-SHELL", "pg_isready -U ${DB_USER_POSTGRES} -d ${DB_NAME_POSTGRES}"]
          interval: 10s
          timeout: 10s
          retries: 5
  backend:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    depends_on:
      postgres-db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ..:/app
      - storage:/app/storage
    networks:
      - template-network

volumes:
  postgres-db:
  storage:

networks:
  template-network:
    driver:
      bridge